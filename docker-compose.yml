

services:

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - F:/qdrant_storage:/qdrant/storage
    restart: unless-stopped

  banking-rag:
    build: .
    container_name: banking-rag-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./documents:/app/documents
      - ./chat_history.json:/app/chat_history.json
    depends_on:
      - qdrant
    restart: unless-stopped